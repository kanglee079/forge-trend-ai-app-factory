services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory}
      POSTGRES_DB: ${POSTGRES_DB:-factory}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factory} -d ${POSTGRES_DB:-factory}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-factory}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-factory123}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./services/api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://factory:factory@postgres:5432/factory}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      API_INTERNAL_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  worker-daemon:
    profiles:
      - worker
    build:
      context: .
      dockerfile: workers/daemon/Dockerfile
    env_file:
      - .env
    environment:
      WORKER_API_BASE_URL: http://api:8000
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      WORKER_WORKSPACE_ROOT: /app/workspaces
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./workspaces:/app/workspaces

volumes:
  pgdata:
  redisdata:
  miniodata:
